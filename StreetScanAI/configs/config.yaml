preprocessing:
  input: data/raw/sample.ply
  output_dir: outputs/pointclouds/preprocessed
  voxel_size: 0.1
  enable_ground_filtering: true
  estimate_density: true

clustering:
  input: outputs/pointclouds/preprocessed/sample_preprocessed.ply
  output_dir: outputs/clusters
  method: dbscan
  eps: 0.8
  min_points: 20
  min_cluster_size: 30

segmentation:
  input: outputs/pointclouds/preprocessed/sample_preprocessed.ply
  output_dir: outputs/semantic
  method: baseline
  weights_path: null
  device: cpu

analytics:
  input: outputs/pointclouds/preprocessed/sample_preprocessed.ply
  output_dir: outputs/analytics
  semantic_labels: outputs/semantic/sample_semantic_labels.csv
  cluster_stats: outputs/clusters/sample_cluster_stats.csv
  grid_resolution: 0.5
  save_plots: true

tracking:
  input: data/trajectories/urban_detections.csv
  output_dir: outputs/trajectories
  fps: 10.0
  association_distance: 2.0
  max_missed_frames: 5
  save_overlay_cloud: true

visualization:
  input: outputs/pointclouds/preprocessed/sample_preprocessed.ply
  output_dir: outputs/visualizations
  semantic_labels: outputs/semantic/sample_semantic_labels.csv
  cluster_labels: outputs/clusters/sample_cluster_labels.csv
  trajectories: outputs/trajectories/sample_tracked_objects.csv
  camera_view: isometric
  save_animation: false

benchmark:
  input: data/raw/sample.ply
  output_dir: outputs/benchmarks
  modes:
    - preprocessing
    - clustering
  repetitions: 3
